  <text x="510" y="218" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#10b981" filter="url(#glow)">856</text>
  <text x="582" y="218" font-family="system-ui, sans-serif" font-size="10" fill="#10b981">+8.3%</text>
  <rect x="510" y="234" width="170" height="4" rx="2" fill="#0f172a"/>
