    <text x="86" y="16" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Feb</text>

    <!-- Mar -->
    <rect x="144" y="-160" width="24" height="160" rx="4" fill="url(#bar1)" opacity="0.9"/>
    <rect x="172" y="-130" width="24" height="130" rx="4" fill="url(#bar2)" opacity="0.9"/>
    <text x="158" y="16" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Mar</text>

    <!-- Apr -->
    <rect x="216" y="-110" width="24" height="110" rx="4" fill="url(#bar1)" opacity="0.9"/>
    <rect x="244" y="-85" width="24" height="85" rx="4" fill="url(#bar2)" opacity="0.9"/>
    <text x="230" y="16" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Apr</text>

    <!-- Mei -->
    <rect x="288" y="-180" width="24" height="180" rx="4" fill="url(#bar1)" opacity="0.9"/>
    <rect x="316" y="-150" width="24" height="150" rx="4" fill="url(#bar2)" opacity="0.9"/>
    <text x="302" y="16" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Mei</text>

    <!-- Jun -->
    <rect x="360" y="-130" width="24" height="130" rx="4" fill="url(#bar1)" opacity="0.9"/>
    <rect x="388" y="-105" width="24" height="105" rx="4" fill="url(#bar2)" opacity="0.9"/>
    <text x="374" y="16" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Jun</text>

    <!-- Jul -->
    <rect x="432" y="-155" width="24" height="155" rx="4" fill="url(#bar1)" opacity="0.9"/>
    <rect x="460" y="-120" width="24" height="120" rx="4" fill="url(#bar2)" opacity="0.9"/>
    <text x="446" y="16" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Jul</text>
  </g>

  <!-- Legend -->
  <rect x="650" y="297" width="8" height="8" rx="2" fill="#3b82f6"/>
  <text x="664" y="305" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">Masuk</text>
