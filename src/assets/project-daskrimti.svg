  <rect x="720" y="156" width="210" height="100" rx="12" fill="url(#card)" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="740" y="182" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" font-weight="500">EKSEKUSI</text>
  <text x="740" y="218" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#f59e0b" filter="url(#glow)">432</text>
