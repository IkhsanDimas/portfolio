    <line x1="0" y1="0" x2="0" y2="675" stroke="#fff" stroke-width="1" transform="translate(100,0)"/>
    <line x1="0" y1="0" x2="0" y2="675" stroke="#fff" stroke-width="1" transform="translate(200,0)"/>
    <line x1="0" y1="0" x2="0" y2="675" stroke="#fff" stroke-width="1" transform="translate(300,0)"/>
    <line x1="0" y1="0" x2="0" y2="675" stroke="#fff" stroke-width="1" transform="translate(400,0)"/>
    <line x1="0" y1="0" x2="0" y2="675" stroke="#fff" stroke-width="1" transform="translate(500,0)"/>
    <line x1="0" y1="0" x2="0" y2="675" stroke="#fff" stroke-width="1" transform="translate(600,0)"/>
    <line x1="0" y1="0" x2="0" y2="675" stroke="#fff" stroke-width="1" transform="translate(700,0)"/>
    <line x1="0" y1="0" x2="0" y2="675" stroke="#fff" stroke-width="1" transform="translate(800,0)"/>
    <line x1="0" y1="0" x2="0" y2="675" stroke="#fff" stroke-width="1" transform="translate(900,0)"/>
    <line x1="0" y1="0" x2="0" y2="675" stroke="#fff" stroke-width="1" transform="translate(1000,0)"/>
    <line x1="0" y1="0" x2="0" y2="675" stroke="#fff" stroke-width="1" transform="translate(1100,0)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,100)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,200)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,300)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,400)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,500)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,600)"/>
