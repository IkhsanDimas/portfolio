  <text x="864" y="322" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Rekapitulasi bulanan</text>

  <!-- Donut chart -->
  <g transform="translate(1000, 430)">
    <circle cx="0" cy="0" r="72" fill="none" stroke="#1e293b" stroke-width="20"/>
    <circle cx="0" cy="0" r="72" fill="none" stroke="#3b82f6" stroke-width="20" stroke-dasharray="320 452" stroke-dashoffset="0" transform="rotate(-90)" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="72" fill="none" stroke="#10b981" stroke-width="20" stroke-dasharray="68 452" stroke-dashoffset="-320" transform="rotate(-90)" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="72" fill="none" stroke="#f59e0b" stroke-width="20" stroke-dasharray="36 452" stroke-dashoffset="-388" transform="rotate(-90)" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="72" fill="none" stroke="#ef4444" stroke-width="20" stroke-dasharray="28 452" stroke-dashoffset="-424" transform="rotate(-90)" stroke-linecap="round"/>
    <text x="0" y="-8" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#e2e8f0" text-anchor="middle">87.3%</text>
    <text x="0" y="12" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">WFO</text>
