  <rect x="72" y="416" width="16" height="16" rx="3" fill="#64748b" opacity="0.4"/>
  <text x="96" y="429" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Absensi</text>

  <!-- Main content area -->
  <!-- Top bar -->
  <rect x="260" y="80" width="900" height="56" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="284" y="114" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#e2e8f0">Dashboard Kriminalitas Terpadu</text>
  <text x="1020" y="114" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Kejati Kepri</text>

  <!-- Stats cards row -->
  <!-- Card 1: Pra-Penuntutan -->
  <rect x="260" y="156" width="210" height="100" rx="12" fill="url(#card)" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="280" y="182" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" font-weight="500">PRA-PENUNTUTAN</text>
  <text x="280" y="218" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#3b82f6" filter="url(#glow)">1,247</text>
  <text x="380" y="218" font-family="system-ui, sans-serif" font-size="10" fill="#10b981">+12.5%</text>
