  <rect x="72" y="224" width="16" height="16" rx="3" fill="#64748b" opacity="0.4"/>
  <text x="96" y="237" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Pra-Penuntutan</text>

  <rect x="72" y="258" width="16" height="16" rx="3" fill="#64748b" opacity="0.4"/>
  <text x="96" y="271" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Penuntutan</text>

  <rect x="72" y="292" width="16" height="16" rx="3" fill="#64748b" opacity="0.4"/>
  <text x="96" y="305" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Upaya Hukum</text>

  <rect x="72" y="326" width="16" height="16" rx="3" fill="#64748b" opacity="0.4"/>
  <text x="96" y="339" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Eksekusi</text>

  <rect x="72" y="360" width="16" height="16" rx="3" fill="#64748b" opacity="0.4"/>
  <text x="96" y="373" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Barang Bukti</text>

