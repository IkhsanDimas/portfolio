  <text x="970" y="218" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#8b5cf6" filter="url(#glow)">2,891</text>
  <text x="1068" y="218" font-family="system-ui, sans-serif" font-size="10" fill="#10b981">+15.7%</text>
