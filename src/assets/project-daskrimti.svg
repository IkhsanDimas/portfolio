  <rect x="260" y="276" width="560" height="310" rx="16" fill="url(#card)" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="284" y="306" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#e2e8f0">Tren Perkara Pidana Umum</text>
