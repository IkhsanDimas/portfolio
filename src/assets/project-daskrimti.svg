  <g transform="translate(864, 340)">
    <rect x="0" y="0" width="8" height="8" rx="2" fill="#3b82f6"/>
    <text x="14" y="8" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">WFO (87.3%)</text>
    <rect x="0" y="18" width="8" height="8" rx="2" fill="#10b981"/>
    <text x="14" y="26" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">Dinas Luar (5.2%)</text>
    <rect x="0" y="36" width="8" height="8" rx="2" fill="#f59e0b"/>
    <text x="14" y="44" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">Izin/Sakit (4.1%)</text>
    <rect x="0" y="54" width="8" height="8" rx="2" fill="#ef4444"/>
    <text x="14" y="62" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">Tidak Absen (3.4%)</text>
